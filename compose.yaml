# Maintainer-only private/local deployment with machine-specific legacy imports.
# Community installations must use compose.community.yaml.
x-ai-environment: &ai-environment
  INTERVIEW_PREP_AI_DB: /ai-data/interview-prep-ai.db
  INTERVIEW_PREP_AI_ENABLED: ${INTERVIEW_PREP_AI_ENABLED:-false}
  INTERVIEW_PREP_AI_PROVIDER: ${INTERVIEW_PREP_AI_PROVIDER:-ollama}
  INTERVIEW_PREP_AI_MODEL: ${INTERVIEW_PREP_AI_MODEL:-llama3.2}
  INTERVIEW_PREP_AI_BASE_URL: ${INTERVIEW_PREP_AI_BASE_URL:-http://ollama:11434}
  INTERVIEW_PREP_AI_API_KEY_FILE: /run/secrets/ai_api_key
  INTERVIEW_PREP_AI_MONTHLY_TOKEN_BUDGET: ${INTERVIEW_PREP_AI_MONTHLY_TOKEN_BUDGET:-1000000}
  INTERVIEW_PREP_AI_MAX_INPUT_TOKENS: ${INTERVIEW_PREP_AI_MAX_INPUT_TOKENS:-12000}
  INTERVIEW_PREP_AI_MAX_OUTPUT_TOKENS: ${INTERVIEW_PREP_AI_MAX_OUTPUT_TOKENS:-2048}
  INTERVIEW_PREP_AI_MAX_RETRIES: ${INTERVIEW_PREP_AI_MAX_RETRIES:-2}
  INTERVIEW_PREP_AI_LEASE_SECONDS: ${INTERVIEW_PREP_AI_LEASE_SECONDS:-60}
  INTERVIEW_PREP_AI_ALLOW_PRIVATE_BASE_URL: ${INTERVIEW_PREP_AI_ALLOW_PRIVATE_BASE_URL:-false}
  INTERVIEW_PREP_AI_ALLOWED_BASE_HOSTS: ${INTERVIEW_PREP_AI_ALLOWED_BASE_HOSTS:-}

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      <<: *ai-environment
      INTERVIEW_PREP_DB: /data/interview-prep.db
      INTERVIEW_PREP_STATIC: /app/frontend/dist
      INTERVIEW_PREP_LEGACY_STATE: /legacy/coach/state.json
      INTERVIEW_PREP_LEGACY_EVENTS: /legacy/coach/events.jsonl
      INTERVIEW_PREP_LEGACY_PROFILE: /legacy/coach/profile.json
      INTERVIEW_PREP_LEGACY_ACTION: /legacy/scripts/action.py
      INTERVIEW_PREP_LEGACY_PLAN: /legacy/plan.md
      INTERVIEW_PREP_ALLOWED_HOSTS: ubuntu-16gb-nbg1-1-hermes.tail1fd6b9.ts.net
      INTERVIEW_PREP_ALLOWED_ORIGINS: https://ubuntu-16gb-nbg1-1-hermes.tail1fd6b9.ts.net
    volumes:
      - ./data:/data
      - ai-data:/ai-data
      - ${INTERVIEW_PREP_AI_API_KEY_FILE:-./secrets/ai_api_key.empty}:/run/secrets/ai_api_key:ro
      - /home/hermes/.hermes/leetcode-coach:/legacy/coach
      - /home/hermes/.hermes/scripts/leetcode-coach:/legacy/scripts:ro
      - /home/hermes/aleksandr-interview-study-plan.md:/legacy/plan.md:ro
    ports:
      - "127.0.0.1:8765:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
  ai-worker:
    profiles: ["ai"]
    build: .
    restart: unless-stopped
    network_mode: host
    command: [".venv/bin/python", "-m", "app.ai.worker"]
    environment:
      <<: *ai-environment
    volumes:
      - ai-data:/ai-data
      - ${INTERVIEW_PREP_AI_API_KEY_FILE:-./secrets/ai_api_key.empty}:/run/secrets/ai_api_key:ro

volumes:
  ai-data:
