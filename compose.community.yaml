name: interview-prep-community

x-ai-environment: &ai-environment
  INTERVIEW_PREP_AI_DB: /ai-data/interview-prep-ai.db
  INTERVIEW_PREP_AI_ENABLED: ${INTERVIEW_PREP_AI_ENABLED:-false}
  INTERVIEW_PREP_AI_PROVIDER: ${INTERVIEW_PREP_AI_PROVIDER:-ollama}
  INTERVIEW_PREP_AI_MODEL: ${INTERVIEW_PREP_AI_MODEL:-}
  INTERVIEW_PREP_AI_BASE_URL: ${INTERVIEW_PREP_AI_BASE_URL:-http://host.docker.internal:11434}
  INTERVIEW_PREP_AI_API_KEY_FILE: /run/secrets/ai_api_key
  INTERVIEW_PREP_AI_MONTHLY_TOKEN_BUDGET: ${INTERVIEW_PREP_AI_MONTHLY_TOKEN_BUDGET:-100000}
  INTERVIEW_PREP_AI_MAX_INPUT_TOKENS: ${INTERVIEW_PREP_AI_MAX_INPUT_TOKENS:-12000}
  INTERVIEW_PREP_AI_MAX_OUTPUT_TOKENS: ${INTERVIEW_PREP_AI_MAX_OUTPUT_TOKENS:-2048}
  INTERVIEW_PREP_AI_MAX_RETRIES: ${INTERVIEW_PREP_AI_MAX_RETRIES:-1}
  INTERVIEW_PREP_AI_LEASE_SECONDS: ${INTERVIEW_PREP_AI_LEASE_SECONDS:-60}
  INTERVIEW_PREP_AI_ALLOW_PRIVATE_BASE_URL: ${INTERVIEW_PREP_AI_ALLOW_PRIVATE_BASE_URL:-false}
  INTERVIEW_PREP_AI_ALLOWED_BASE_HOSTS: ${INTERVIEW_PREP_AI_ALLOWED_BASE_HOSTS:-}

services:
  app:
    build: .
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    environment:
      <<: *ai-environment
      INTERVIEW_PREP_DB: /data/interview-prep.db
      INTERVIEW_PREP_STATIC: /app/frontend/dist
      INTERVIEW_PREP_BOOTSTRAP: community
      INTERVIEW_PREP_ALLOWED_HOSTS: ${INTERVIEW_PREP_ALLOWED_HOSTS:-}
      INTERVIEW_PREP_ALLOWED_ORIGINS: ${INTERVIEW_PREP_ALLOWED_ORIGINS:-}
    volumes:
      - core-data:/data
      - ai-data:/ai-data
      - ${INTERVIEW_PREP_AI_API_KEY_FILE:-./secrets/ai_api_key.empty}:/run/secrets/ai_api_key:ro
    tmpfs: [/tmp]
    ports: ["127.0.0.1:${INTERVIEW_PREP_PORT:-8765}:8000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  ai-worker:
    profiles: [ai]
    build: .
    restart: on-failure:3
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    command: [".venv/bin/python", "-m", "app.ai.worker"]
    environment: *ai-environment
    volumes:
      - ai-data:/ai-data
      - ${INTERVIEW_PREP_AI_API_KEY_FILE:-./secrets/ai_api_key.empty}:/run/secrets/ai_api_key:ro
    tmpfs: [/tmp]
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test: ["CMD", ".venv/bin/python", "-c", "from app.ai.config import AIConfig; c=AIConfig.from_env(); assert c.enabled and c.model"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  core-data:
  ai-data: